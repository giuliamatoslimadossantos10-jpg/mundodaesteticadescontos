                            <i class="fa-solid fa-caret-down text-amber-500 text-5xl"></i>
                        </div>
                        
                        <!-- The Wheel -->
                        <svg id="wheel" class="w-full h-full shadow-2xl rounded-full border-4 border-amber-500/50" viewBox="0 0 100 100">
                            <!-- Outer Ring -->
                            <circle cx="50" cy="50" r="48" fill="#2d2521" stroke="#C5A880" stroke-width="2"/>
                            
                            <!-- Segment 1: 15% OFF Infinity -->
                            <path d="M50,50 L50,2 A48,48 0 0,1 91.5,74 Z" fill="#1C1917" />
                            <!-- Segment 2: E-Book Free -->
                            <path d="M50,50 L91.5,74 A48,48 0 0,1 50,98 Z" fill="#C5A880" />
                            <!-- Segment 3: 10% OFF Avulsos -->
                            <path d="M50,50 L50,98 A48,48 0 0,1 8.5,74 Z" fill="#1C1917" />
                            <!-- Segment 4: Mentoria VIP -->
                            <path d="M50,50 L8.5,74 A48,48 0 0,1 8.5,26 Z" fill="#2D2521" />
                            <!-- Segment 5: 20% OFF Geral -->
                            <path d="M50,50 L8.5,26 A48,48 0 0,1 50,2 Z" fill="#C5A880" />

                            <!-- Segment Texts -->
                            <g transform="translate(50,50)" fill="#ffffff" font-size="3.5" font-weight="bold" text-anchor="middle">
                                <text transform="rotate(36, 0, 0) translate(0, -32) rotate(180)" fill="#C5A880">15% INFINITY</text>
                                <text transform="rotate(108, 0, 0) translate(0, -32) rotate(180)" fill="#1C1917">E-BOOK GRÁTIS</text>
                                <text transform="rotate(180, 0, 0) translate(0, -32) rotate(180)" fill="#C5A880">10% CURSOS</text>
                                <text transform="rotate(252, 0, 0) translate(0, -32) rotate(180)" fill="#ffffff">MENTORIA VIP</text>
                                <text transform="rotate(324, 0, 0) translate(0, -32) rotate(180)" fill="#1C1917">20% PREMIUM</text>
                            </g>

                            <!-- Center Pin -->
                            <circle cx="50" cy="50" r="10" fill="#1C1917" stroke="#C5A880" stroke-width="2" />
                            <circle cx="50" cy="50" r="5" fill="#C5A880" />
                        </svg>
