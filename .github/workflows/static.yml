                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between text-stone-400 text-sm pb-2 border-b border-stone-800">
                                <span>Total em cursos avulsos:</span>
                                <span id="calc-total-single" class="font-bold text-white text-base">R$ 1.194</span>
