                                <div>
                                    <span class="font-bold text-stone-900 text-sm sm:text-base block">Drenagem Linfática Corporal e Facial</span>
                                    <span class="text-xs text-stone-500">Técnicas manuais e pós-operatório cirúrgico</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="font-black text-stone-800 text-sm sm:text-base">R$ 897</span>
                            </div>
                        </label>

                        <!-- Course Item 4 -->
                        <label class="flex items-center justify-between p-4 bg-white hover:bg-stone-50 rounded-xl border border-stone-200 cursor-pointer transition-all">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" onchange="calculateSavings()" data-price="1497" class="course-calc-checkbox w-5 h-5 rounded border-stone-300 text-aesthetic-600 focus:ring-aesthetic-gold">
