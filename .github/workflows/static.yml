    <!-- Script Interações -->
    <script>
        let isSpinning = false;
        let toastTimeout;

        // Custom Clipboard Copy (com robustez para iFrame)
        function copyToClipboard(text) {
            try {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = text;
                tempTextArea.style.position = "absolute";
                tempTextArea.style.left = "-9999px";
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand("copy");
                document.body.removeChild(tempTextArea);
                
                showToast("Cupom Copiado!", `Use o código "${text}" no fechamento da compra.`);
            } catch (err) {
                console.error("Falha ao copiar:", err);
                showToast("Erro ao copiar", "Não foi possível copiar automaticamente. Selecione e copie o texto manualmente.");
            }
        }

        // Sistema Global de Toast Notifications
        function showToast(title, message) {
            const toast = document.getElementById("toast");
            const toastTitle = document.getElementById("toast-title");
            const toastMessage = document.getElementById("toast-message");

            toastTitle.innerText = title;
            toastMessage.innerText = message;

            // Limpa timeout ativo anterior se houver
            clearTimeout(toastTimeout);

            // Exibe o Toast com transição suave
            toast.classList.remove("translate-y-20", "opacity-0", "pointer-events-none");
            toast.classList.add("translate-y-0", "opacity-100");

            // Oculta após 4 segundos
            toastTimeout = setTimeout(() => {
                toast.classList.add("translate-y-20", "opacity-0", "pointer-events-none");
                toast.classList.remove("translate-y-0", "opacity-100");
            }, 4000);
        }

        // Controle da Roda da Sorte
        function spinWheel() {
            if (isSpinning) return;

            isSpinning = true;
            const wheel = document.getElementById("wheel");
            const spinButton = document.getElementById("spin-button");
            const rewardBox = document.getElementById("reward-box");

            // Desativa botão temporariamente e atualiza ícone
            spinButton.disabled = true;
            spinButton.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> SORTEANDO...`;

            // Prêmios mapeados pelos setores da roleta (360 graus / 5 setores = 72 graus cada)
            // Ordem visual na roleta (sentido horário a partir do topo):
            // 0° a 72°: 15% OFF Infinity
            // 72° a 144°: 20% PREMIUM (Setor Premium de 20%)
            // 144° a 216°: MENTORIA VIP
            // 216° a 288°: 10% CURSOS
            // 288° a 360°: E-BOOK GRÁTIS
            const prizes = [
                { name: "15% OFF na Assinatura Infinity", coupon: "INFINITY15", desc: "Economize ainda mais no seu plano anual ilimitado!" },
                { name: "20% OFF Premium de Estética", coupon: "PREMIUM20", desc: "Desconto espetacular válido para qualquer curso VIP do catálogo!" },
                { name: "Mentoria VIP Exclusiva com Mentora", coupon: "MENTORIAVIP", desc: "Sessão individual para acelerar o seu faturamento em estética!" },
                { name: "10% de Desconto em Cursos Avulsos", coupon: "CURSOS10", desc: "Válido para compras de cursos livres selecionados." },
                { name: "E-Book Oficial Grátis", coupon: "EBOOKGRATIS", desc: "Você ganhou o Guia Completo de Estética e Limpeza de Pele Profissional!" }
            ];

            // Escolhe um prêmio aleatório (0 a 4)
            const prizeIndex = Math.floor(Math.random() * prizes.length);
            
            // Calcula graus de rotação: 
            // Cada setor tem 72 graus de largura. Para centralizar o indicador no topo (270° trigonométrico ou topo do SVG):
            // Nós definimos a rotação da roleta de modo que o setor escolhido termine no topo.
            // Para garantir múltiplas rotações (visual estético), adicionamos entre 5 e 10 voltas completas (1800° a 3600°).
            const degreesPerSector = 72;
            const sectorCenterOffset = degreesPerSector / 2;
            // Rotação alvo para alinhar o setor selecionado com o indicador de topo
            const targetSectorAngle = 360 - (prizeIndex * degreesPerSector) - sectorCenterOffset;
            const extraSpins = 5 * 360; // 5 voltas cheias
            const finalRotation = extraSpins + targetSectorAngle;

            // Executa animação no SVG da roleta
            wheel.style.transform = `rotate(${finalRotation}deg)`;

            // Espera a transição de CSS terminar (definida como 4 segundos na folha de estilos do cabeçalho)
            setTimeout(() => {
                const selectedPrize = prizes[prizeIndex];

                // Atualiza visual do bloco de recompensa
                rewardBox.innerHTML = `
                    <div class="inline-flex w-14 h-14 items-center justify-center rounded-2xl bg-amber-500/20 text-aesthetic-gold text-2xl mb-6 animate-bounce">
                        <i class="fa-solid fa-gift"></i>
                    </div>
                    <span class="text-xs font-bold uppercase tracking-widest text-emerald-400 block mb-1">Prêmio Sorteado!</span>
                    <h3 class="text-2xl font-bold mb-2 text-white">${selectedPrize.name}</h3>
                    <p class="text-stone-400 text-sm mb-6">${selectedPrize.desc}</p>
                    
                    <div class="bg-stone-900 p-4 rounded-xl border border-dashed border-stone-700 flex items-center justify-between mb-6">
                        <div class="text-left">
                            <span class="block text-[10px] text-stone-500 font-bold uppercase tracking-wide">Código de Ativação</span>
                            <span class="font-mono font-black text-amber-400 tracking-wider text-base">${selectedPrize.coupon}</span>
                        </div>
                        <button onclick="copyToClipboard('${selectedPrize.coupon}')" class="bg-white hover:bg-stone-100 text-stone-950 px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 shadow-md">
                            <i class="fa-regular fa-copy"></i> Copiar
                        </button>
                    </div>

                    <div class="border-t border-stone-700 pt-6">
                        <a href="https://mundoestetica.com.br" target="_blank" class="w-full inline-flex items-center justify-center gap-2 text-center text-xs text-emerald-400 hover:text-emerald-300 font-bold uppercase tracking-wide transition-colors">
                            Aproveitar Desconto no Site Oficial <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        </a>
                    </div>
                `;

                // Reseta estado do botão e notifica o usuário
                spinButton.innerHTML = `<i class="fa-solid fa-circle-check"></i> GIRO UTILIZADO`;
                spinButton.classList.remove("dark-gold-gradient");
                spinButton.classList.add("bg-stone-800", "cursor-not-allowed", "text-stone-500", "border-stone-700");
                
                showToast("Parabéns!", `Você ganhou: ${selectedPrize.name}`);
            }, 4000);
        }

        // Calculadora Dinâmica do Simulador de Economia
        function calculateSavings() {
            const checkboxes = document.querySelectorAll(".course-calc-checkbox");
            const totalSingleEl = document.getElementById("calc-total-single");
            const savingsResultEl = document.getElementById("calc-savings-result");

            let totalSelectedPrice = 0;

            checkboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    totalSelectedPrice += parseFloat(checkbox.getAttribute("data-price"));
                }
            });

            // O preço anual à vista da assinatura Infinity é R$ 1.044,00 (12x de R$ 87,00)
            const infinityPrice = 1044;
            const savings = totalSelectedPrice - infinityPrice;

            // Atualiza o valor dos cursos individuais selecionados
            totalSingleEl.innerText = `R$ ${totalSelectedPrice.toLocaleString('pt-BR', { minimumFractionDigits: 0 })}`;

            // Atualiza o bloco de economia com formatação dinâmica
            if (savings > 0) {
                savingsResultEl.innerText = `R$ ${savings.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
                savingsResultEl.className = "text-3xl font-black text-emerald-400 mt-1";
            } else {
                // Se for menor ou igual ao preço da assinatura, mostramos que a assinatura unificada ainda oferece mais vantagens gerais
                savingsResultEl.innerText = "Assinatura Infinity vale mais!";
                savingsResultEl.className = "text-xl font-bold text-amber-400 mt-1";
            }
        }

        // Funções de Controle das Telas Modais de Vendas
        function openPromoModal(courseName, price) {
            const modal = document.getElementById("promo-modal");
            const modalCourseName = document.getElementById("modal-course-name");
            const modalCoursePrice = document.getElementById("modal-course-price");

            modalCourseName.innerText = courseName;
            modalCoursePrice.innerText = price;

            modal.classList.remove("hidden");
            document.body.style.overflow = "hidden"; // Desativa scroll do fundo
        }

        function closePromoModal() {
            const modal = document.getElementById("promo-modal");
            modal.classList.add("hidden");
            document.body.style.overflow = ""; // Reativa o scroll do fundo
        }

        // Calcula a economia inicial no carregamento da página
        window.onload = function() {
            calculateSavings();
        };
    </script>
</body>
</html>
