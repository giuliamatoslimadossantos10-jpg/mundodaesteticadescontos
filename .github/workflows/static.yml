                    <button id="spin-button" onclick="spinWheel()" class="mt-8 px-10 py-4 dark-gold-gradient hover:brightness-110 text-white font-extrabold text-lg rounded-full shadow-lg hover:shadow-amber-500/20 transition-all border border-amber-300 flex items-center gap-3">
